name: Build Secure Windows Proxy

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # PyArmor пока убрали из зависимостей для чистого теста
          pip install pyinstaller customtkinter
          pip install -e .[win10]

      - name: Inject Secret Salt
        shell: bash
        run: |
          # Подставляем твой секретный пароль из GitHub Secrets в код
          sed -i "s/REPLACE_ME_SECRET_SALT/${{ secrets.PROXY_SECRET_SALT }}/g" proxy/hwid_auth.py

      - name: Build with PyInstaller
        shell: cmd
        run: |
          :: Собираем EXE. Теперь PyInstaller точно найдет и упакует hwid_auth.py
          pyinstaller packaging/windows.spec

      - name: Upload Secure EXE
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy_Secure_Windows
          path: dist/*.exe
