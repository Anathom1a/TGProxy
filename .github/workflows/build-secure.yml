name: Build Secure Windows Proxy

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Устанавливаем конкретную версию pyarmor, она стабильнее в CI
          pip install pyinstaller pyarmor==8.5.10 customtkinter
          pip install -e .[win10]

      - name: Inject Secret Salt
        shell: bash
        run: |
          # Вставляем твой секрет в код
          sed -i "s/REPLACE_ME_SECRET_SALT/${{ secrets.PROXY_SECRET_SALT }}/g" proxy/hwid_auth.py

      - name: Obfuscate Code
        run: |
          # Шифруем ТОЛЬКО hwid_auth.py, чтобы влезть в лимиты лицензии
          pyarmor gen -O obf_dist proxy/hwid_auth.py
          
          # Исправляем пути: копируем зашифрованный файл обратно в папку proxy
          # В бесплатной версии PyArmor складывает файлы прямо в корень папки вывода
          copy /Y obf_dist\hwid_auth.py proxy\hwid_auth.py
          
          # Копируем служебные файлы PyArmor (runtime), без них зашифрованный файл не запустится
          # Они создаются в obf_dist\pyarmor_runtime_000000 (или похожей)
          xcopy /E /I /Y obf_dist\pyarmor_runtime_000000 proxy\pyarmor_runtime_000000

      - name: Build with PyInstaller
        run: |
          # Собираем EXE. PyInstaller подхватит зашифрованный hwid_auth
          pyinstaller packaging/windows.spec

      - name: Upload Secure EXE
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy_Secure_Windows
          path: dist/*.exe
